name: CI

on:
  pull_request:
  push:

jobs:
  smoke:
    name: Lightweight smoke checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Docker Compose config
        run: docker compose config --quiet

      - name: Compile Python source
        run: |
          python -m compileall -q backend/app
          python -m compileall -q ai-models/menu-translation-service/app
          python -m compileall -q ai-models/place-search-service/app
          python -m compileall -q ai-models/rag-service/app
          python -m compileall -q ai-models/review-summary-service/app
          python -m py_compile data-engineering/scripts/*.py data-engineering/google-maps-scraper/scripts/*.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
