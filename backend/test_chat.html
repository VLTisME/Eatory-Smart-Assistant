<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Travel Chat — API Tester</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #16213e;
      --bg-input: #1a1a2e;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --border: #2a2a40;
      --danger: #ff4757;
      --danger-hover: #ff6b7a;
      --success: #2ed573;
      --user-bubble: #6c63ff;
      --bot-bubble: #2a2a40;
      --scrollbar-bg: #1a1a2e;
      --scrollbar-thumb: #3a3a55;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-bg); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0f0f1a 70%);
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6c63ff, #48c6ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-card p {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      width: 100%;
    }

    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    .btn-google {
      width: 100%;
      padding: 12px 24px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .btn-google:hover {
      background: var(--bg-card);
      border-color: var(--text-muted);
      transform: translateY(-1px);
    }

    .btn-google:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* ===== CHAT LAYOUT ===== */
    #chat-screen {
      display: none;
      height: 100vh;
    }

    .chat-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
    }

    /* --- Sidebar --- */
    .sidebar {
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .new-chat-row {
      display: flex;
      gap: 8px;
    }

    .new-chat-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
    }

    .new-chat-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .btn-icon:hover { background: var(--accent-hover); }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .conv-item:hover { background: var(--bg-card); }
    .conv-item.active { background: var(--accent); color: white; }

    .conv-item-title {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item-delete {
      opacity: 0;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .conv-item:hover .conv-item-delete { opacity: 1; }
    .conv-item-delete:hover { color: var(--danger); background: rgba(255,71,87,0.1); }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* --- Main Chat --- */
    .chat-main {
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-header-icon {
      font-size: 20px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      animation: fadeIn 0.25s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bot-bubble);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    .message.assistant .message-meta {
      color: var(--text-muted);
    }

    .chat-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
    }

    .chat-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* Chat Input */
    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-input-row select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }

    .chat-input-row select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .chat-input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .chat-input-row input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-send {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      color: white;
      z-index: 9999;
      animation: toastIn 0.3s ease-out;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div id="login-screen">
    <div class="login-card">
      <h1>✈️ Smart Travel Chat</h1>
      <p>Đăng nhập bằng tài khoản Firebase để test API</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" value="test@gmail.com">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input type="password" id="login-password" value="123456">
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Đăng nhập</button>
        <button class="btn btn-primary" id="btn-register" onclick="doRegister()" style="background:var(--bg-secondary); border:1px solid var(--border); color:var(--text-primary);">Đăng ký</button>
      </div>

      <div style="display:flex;align-items:center;gap:12px;margin:20px 0 16px;">
        <hr style="flex:1;border:none;border-top:1px solid var(--border);">
        <span style="color:var(--text-muted);font-size:12px;">HOẶC</span>
        <hr style="flex:1;border:none;border-top:1px solid var(--border);">
      </div>

      <button class="btn btn-google" id="btn-google" onclick="doGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0;"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Đăng nhập bằng Google
      </button>

      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ========== CHAT SCREEN ========== -->
  <div id="chat-screen">
    <div class="chat-layout">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h2>💬 Trò chuyện</h2>
          <div class="new-chat-row">
            <input type="text" id="new-chat-title" placeholder="Tên chat mới..." 
                   onkeypress="if(event.key==='Enter') createConv()">
            <button class="btn-icon" onclick="createConv()" title="Tạo chat mới">+</button>
          </div>
        </div>
        <div class="conv-list" id="conv-list">
          <!-- Conversations sẽ render ở đây -->
        </div>
        <div class="sidebar-footer">
          <span id="user-email">...</span>
          <button class="btn-logout" onclick="doLogout()">Đăng xuất</button>
        </div>
      </div>

      <!-- Main Chat -->
      <div class="chat-main">
        <div class="chat-header" id="chat-header">
          <span class="chat-header-icon">✈️</span>
          <span id="chat-title">Chọn hoặc tạo cuộc trò chuyện</span>
        </div>

        <div class="chat-messages" id="chat-messages">
          <div class="chat-empty" id="chat-empty">
            <div>
              <div class="chat-empty-icon">💬</div>
              <div>Chọn một cuộc trò chuyện từ sidebar<br>hoặc tạo mới để bắt đầu</div>
            </div>
          </div>
        </div>

        <div class="chat-input-area" id="chat-input-area" style="display: none;">
          <div class="chat-input-row">
            <input type="text" id="msg-input" placeholder="Nhập tin nhắn..." 
                   onkeypress="if(event.key==='Enter') sendMsg()">
            <button class="btn-send" onclick="sendMsg()" title="Gửi">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase JS SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    // ============ FIREBASE CONFIG ============
    const firebaseConfig = {
      apiKey: "AIzaSyCDlOPMyRSVgSlsVD166A0qB82VVycpagk",
      authDomain: "tourism-project-48c9a.firebaseapp.com",
      projectId: "tourism-project-48c9a",
    };
    firebase.initializeApp(firebaseConfig);

    // ============ STATE ============
    const API = "http://localhost:8000/api/v1/chat/conversations";
    const FIREBASE_KEY = firebaseConfig.apiKey;

    let token = null;
    let currentConvId = null;

    // ============ HELPERS ============
    function headers() {
      return { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" };
    }

    function showToast(msg, type = "success") {
      const t = document.createElement("div");
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function formatTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" });
    }

    // ============ LOGIN ============
    async function doLogin() {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      const btn = document.getElementById("btn-login");
      const errEl = document.getElementById("login-error");

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Đang đăng nhập...';
      errEl.style.display = "none";

      try {
        const url = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FIREBASE_KEY}`;
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, returnSecureToken: true })
        });
        const data = await res.json();

        if (data.idToken) {
          token = data.idToken;
          document.getElementById("user-email").textContent = email;
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("chat-screen").style.display = "block";
          showToast("Đăng nhập thành công!");
          loadConversations();
        } else {
          errEl.textContent = "Sai email hoặc mật khẩu";
          errEl.style.display = "block";
        }
      } catch (e) {
        errEl.textContent = "Lỗi kết nối: " + e.message;
        errEl.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Đăng nhập";
    }

    async function doRegister() {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      const btn = document.getElementById("btn-register");
      const errEl = document.getElementById("login-error");

      if (!email || !password || password.length < 6) {
        errEl.textContent = "Vui lòng nhập email hợp lệ và mật khẩu ít nhất 6 ký tự.";
        errEl.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Đang đăng ký...';
      errEl.style.display = "none";

      try {
        const url = `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FIREBASE_KEY}`;
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password, returnSecureToken: true })
        });
        const data = await res.json();

        if (data.idToken) {
          token = data.idToken;
          document.getElementById("user-email").textContent = email;
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("chat-screen").style.display = "block";
          showToast("Đăng ký thành công!");
          loadConversations();
        } else {
          errEl.textContent = "Lỗi đăng ký: " + (data.error ? data.error.message : JSON.stringify(data));
          errEl.style.display = "block";
        }
      } catch (e) {
        errEl.textContent = "Lỗi kết nối: " + e.message;
        errEl.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Đăng ký";
    }

    // ============ GOOGLE LOGIN ============
    async function doGoogleLogin() {
      const btn = document.getElementById("btn-google");
      const errEl = document.getElementById("login-error");
      btn.disabled = true;
      errEl.style.display = "none";

      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await firebase.auth().signInWithPopup(provider);
        const idToken = await result.user.getIdToken();

        token = idToken;
        document.getElementById("user-email").textContent = result.user.email;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "block";
        showToast("Đăng nhập Google thành công!");
        loadConversations();
      } catch (e) {
        if (e.code !== "auth/popup-closed-by-user") {
          errEl.textContent = "Google login lỗi: " + e.message;
          errEl.style.display = "block";
        }
      }

      btn.disabled = false;
    }

    function doLogout() {
      token = null;
      currentConvId = null;
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("chat-screen").style.display = "none";
    }

    // ============ CONVERSATIONS ============
    async function loadConversations() {
      try {
        const res = await fetch(`${API}/`, { headers: headers() });
        const convs = await res.json();
        renderConvList(convs);
      } catch (e) {
        showToast("Lỗi load conversations: " + e.message, "error");
      }
    }

    function renderConvList(convs) {
      const list = document.getElementById("conv-list");
      if (convs.length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">Chưa có cuộc trò chuyện nào</div>';
        return;
      }
      list.innerHTML = convs.map(c => `
        <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" 
             onclick="selectConv('${c.id}')">
          <span class="conv-item-title">${escHtml(c.title)}</span>
          <button class="conv-item-delete" onclick="event.stopPropagation(); deleteConv('${c.id}')" title="Xoá">🗑️</button>
        </div>
      `).join("");
    }

    function escHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function createConv() {
      const input = document.getElementById("new-chat-title");
      const title = input.value.trim();
      if (!title) return;

      try {
        const res = await fetch(`${API}/`, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ title })
        });
        const conv = await res.json();
        input.value = "";
        currentConvId = conv.id;
        showToast("Đã tạo chat mới!");
        loadConversations();
        loadMessages(conv.id, conv.title);
      } catch (e) {
        showToast("Lỗi tạo chat: " + e.message, "error");
      }
    }

    async function deleteConv(id) {
      if (!confirm("Bạn muốn xoá cuộc trò chuyện này?")) return;

      try {
        await fetch(`${API}/${id}`, { method: "DELETE", headers: headers() });
        showToast("Đã xoá!");
        if (currentConvId === id) {
          currentConvId = null;
          document.getElementById("chat-messages").innerHTML = `
            <div class="chat-empty"><div>
              <div class="chat-empty-icon">💬</div>
              <div>Chọn một cuộc trò chuyện từ sidebar<br>hoặc tạo mới để bắt đầu</div>
            </div></div>`;
          document.getElementById("chat-title").textContent = "Chọn hoặc tạo cuộc trò chuyện";
          document.getElementById("chat-input-area").style.display = "none";
        }
        loadConversations();
      } catch (e) {
        showToast("Lỗi xoá: " + e.message, "error");
      }
    }

    async function selectConv(id) {
      currentConvId = id;
      loadConversations(); // Re-render to highlight active

      try {
        const res = await fetch(`${API}/${id}`, { headers: headers() });
        const detail = await res.json();
        loadMessages(id, detail.title, detail.messages);
      } catch (e) {
        showToast("Lỗi load chi tiết: " + e.message, "error");
      }
    }

    // ============ MESSAGES ============
    function loadMessages(convId, title, messages = []) {
      document.getElementById("chat-title").textContent = title;
      document.getElementById("chat-input-area").style.display = "block";

      const container = document.getElementById("chat-messages");

      if (messages.length === 0) {
        container.innerHTML = `
          <div class="chat-empty"><div>
            <div class="chat-empty-icon">🗨️</div>
            <div>Chưa có tin nhắn. Hãy gửi tin nhắn đầu tiên!</div>
          </div></div>`;
        return;
      }

      container.innerHTML = messages.map(m => `
        <div class="message ${m.role}">
          <div>${escHtml(m.content)}</div>
          <div class="message-meta">${m.role === 'user' ? '👤' : '🤖'} ${formatTime(m.created_at)}</div>
        </div>
      `).join("");

      // Auto scroll xuống cuối
      container.scrollTop = container.scrollHeight;
    }

    async function sendMsg() {
      if (!currentConvId) return;

      const input = document.getElementById("msg-input");
      const content = input.value.trim();
      if (!content) return;

      input.value = "";

      try {
        // 1. Gửi message của user
        await fetch(`${API}/${currentConvId}/messages`, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ role: "user", content })
        });

        // 2. Giả lập bot reply (đảo ngược chuỗi + thêm emoji)
        const botReply = generateBotReply(content);
        await fetch(`${API}/${currentConvId}/messages`, {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ role: "assistant", content: botReply })
        });

        // 3. Reload messages
        const res = await fetch(`${API}/${currentConvId}`, { headers: headers() });
        const detail = await res.json();
        loadMessages(currentConvId, detail.title, detail.messages);
        loadConversations();
      } catch (e) {
        showToast("Lỗi gửi tin nhắn: " + e.message, "error");
      }
    }

    function generateBotReply(userMsg) {
      // Giả lập AI response — bạn có thể thay bằng gọi API AI thật sau
      const replies = [
        `Bạn vừa hỏi: "${userMsg}". Mình sẽ tìm hiểu và trả lời ngay nhé! ✈️`,
        `Đó là một câu hỏi hay! Về "${userMsg}" thì mình gợi ý bạn nên tham khảo thêm. 🌏`,
        `Cảm ơn bạn đã hỏi về "${userMsg}". Đây là một chủ đề rất thú vị! 🗺️`,
        `Mình đã ghi nhận câu hỏi: "${userMsg}". Để mình tìm thông tin cho bạn nhé! 🔍`,
        `"${userMsg}" — Tuyệt vời! Mình có vài gợi ý cho bạn. Hãy đợi chút nhé! 😊`,
      ];
      return replies[Math.floor(Math.random() * replies.length)];
    }
  </script>
</body>
</html>
